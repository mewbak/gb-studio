<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=contain"
    />
    <meta
      name="description"
      content="GBS Music is a chiptune music editor by the creators of GB Studio."
    />
    <meta name="theme-color" content="#c92c61" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="GBS Music" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GBS Music" />
    <meta property="og:title" content="GBS Music" />
    <meta
      property="og:description"
      content="GBS Music is a chiptune music editor by the creators of GB Studio."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./icons/app_music_icon_256.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="256" />
    <meta property="og:image:height" content="256" />
    <meta property="og:site_name" content="GBS Music" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="GBS Music" />
    <meta
      name="twitter:description"
      content="GBS Music is a chiptune music editor by the creators of GB Studio."
    />
    <meta name="twitter:image" content="./icons/app_music_icon_256.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="256x256"
      href="./icons/app_music_icon_256.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="180x180"
      href="./icons/app_music_icon_180.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./icons/app_music_icon_180.png"
    />
    <link rel="manifest" href="./manifest.json" />
    <title>GBS Music</title>
  </head>
  <body>
    <div id="App"></div>
    <div id="MenuPortal"></div>
    <script src="./bundle.js"></script>
    <script>
      const isLocalhost =
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1" ||
        location.hostname === "[::1]";

      if ("serviceWorker" in navigator && !isLocalhost) {
        const checkForSwUpdate = async () => {
          const registration = await navigator.serviceWorker.register(
            "./service-worker.js",
            { updateViaCache: "none" },
          );
          await registration.update();
        };

        window.addEventListener("pageshow", () => {
          void checkForSwUpdate();
        });

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") {
            void navigator.serviceWorker
              .getRegistration()
              .then((registration) => {
                if (registration) {
                  return registration.update();
                }
              });
          }
        });
      }
    </script>
  </body>
</html>
